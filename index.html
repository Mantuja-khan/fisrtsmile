<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivoxo Toys — India's Playful Toy Store</title>
  <meta name="description"
    content="Shop premium toys online at Trivoxo Toys — soft toys, educational, action figures, RC cars and more." />
  <!-- Shiprocket/Fastrr OTP Login Integration -->
  <link rel="stylesheet" href="https://checkout-ui.shiprocket.com/assets/styles/shopify.css" />
  <script src="https://checkout-ui.shiprocket.com/assets/js/channels/login.js"></script>
  <script src="https://checkout-ui.shiprocket.com/assets/js/channels/shopify.js"></script>
</head>
<body>
  <div id="app"></div>
  <!-- Required container for Shiprocket/Fastrr login widget --
       login.js reads .style on this element; without it the widget throws
       "Cannot read properties of null (reading 'style')" on modal close -->
  <div
    id="fastrr-checkout"
    style="display:none;position:fixed;z-index:99999;top:0;left:0;width:100%;height:100%;"
    aria-hidden="true"
  ></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
