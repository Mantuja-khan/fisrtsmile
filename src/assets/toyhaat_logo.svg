<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="toyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Minimalist playful bear icon -->
  <g transform="translate(5, 5)">
    <!-- Left Ear -->
    <circle cx="14" cy="16" r="8" fill="url(#toyGradient)" />
    <!-- Right Ear -->
    <circle cx="40" cy="16" r="8" fill="url(#toyGradient)" />
    <!-- Head -->
    <circle cx="27" cy="30" r="18" fill="url(#toyGradient)" />
    <!-- Muzzle -->
    <ellipse cx="27" cy="36" rx="8" ry="6" fill="#FFFFFF" />
    <!-- Eyes -->
    <circle cx="21" cy="28" r="2.5" fill="#FFFFFF" />
    <circle cx="33" cy="28" r="2.5" fill="#FFFFFF" />
    <!-- Nose -->
    <circle cx="27" cy="34" r="2" fill="#2C3E50" />
    <!-- Smile -->
    <path d="M 24 38 Q 27 41 30 38" stroke="#2C3E50" stroke-width="1.5" fill="none" stroke-linecap="round" />
  </g>

  <!-- Text Label "ToyHaat" -->
  <text x="65" y="43" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="34" fill="#1A202C" letter-spacing="-0.5">
    <tspan fill="#1D4ED8">Toy</tspan><tspan fill="#FF6B6B">Haat</tspan>
  </text>
</svg>
